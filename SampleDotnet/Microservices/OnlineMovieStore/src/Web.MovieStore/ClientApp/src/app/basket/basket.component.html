<div class="basket-container">
  <div class="basket-header">
    <h2><i class="pi pi-shopping-cart"></i> {{title}}</h2>
    <p-divider></p-divider>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!basket || !basket.items || basket.items.length === 0">
    <i class="pi pi-shopping-cart"></i>
    <h3>Your cart is empty</h3>
    <p>Add movies you like to your cart</p>
    <p-button icon="pi pi-play"
              label="Start Shopping"
              [routerLink]="['/']">
    </p-button>
  </div>

  <!-- Basket Items -->
  <div class="basket-content" *ngIf="basket?.items?.length > 0">
    <p-table [value]="basket.items" styleClass="p-datatable-striped">
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 80px">Image</th>
          <th>Title</th>
          <th style="width: 120px">Price</th>
          <th style="width: 80px">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td>
            <img [src]="'assets/images/' + item.productid + '.png'"
                 [alt]="item.title"
                 class="basket-item-image">
          </td>
          <td>
            <a class="item-title" (click)="movieById('/movie/' + item.productid)">
              {{item.title}}
            </a>
          </td>
          <td>
            <p-tag [value]="item.salesprice + '$'"
                   severity="success"
                   styleClass="price-tag">
            </p-tag>
          </td>
          <td>
            <p-button icon="pi pi-trash"
                      styleClass="p-button-danger p-button-text p-button-rounded"
                      pTooltip="Remove from cart"
                      (click)="removeFromBasket(item.id)">
            </p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div class="basket-summary">
      <p-card styleClass="summary-card">
        <div class="summary-content">
          <div class="summary-row">
            <span class="summary-label">Items:</span>
            <span class="summary-value">{{basket.items.length}}</span>
          </div>
          <p-divider></p-divider>
          <div class="summary-row total">
            <span class="summary-label">Total:</span>
            <span class="summary-value">{{calculatedTotalPrice | number : '.2-2'}}$</span>
          </div>
          <p-button icon="pi pi-credit-card"
                    label="Complete Purchase"
                    styleClass="p-button-success purchase-btn"
                    (click)="purchase(basket.id)">
          </p-button>
        </div>
      </p-card>
    </div>
  </div>
</div>
