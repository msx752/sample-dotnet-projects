<div class="login-container">
  <p-card styleClass="login-card">
    <ng-template pTemplate="header">
      <div class="login-header">
        <div class="avatar-container">
          <i class="pi pi-user"></i>
        </div>
        <h2>Welcome Back</h2>
        <p>Sign in to continue</p>
      </div>
    </ng-template>

    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
      <div class="form-field">
        <label for="username">
          <i class="pi pi-user"></i>
          Username
        </label>
        <input id="username"
               type="text"
               pInputText
               name="username"
               [(ngModel)]="form.username"
               required
               #username="ngModel"
               [disabled]="inProgressLoginButton"
               placeholder="Enter your username"
               class="w-full">
        <p-message *ngIf="username.errors && f.submitted"
                   severity="error"
                   text="Username is required">
        </p-message>
      </div>

      <div class="form-field">
        <label for="password">
          <i class="pi pi-lock"></i>
          Password
        </label>
        <p-password id="password"
                    name="password"
                    [(ngModel)]="form.password"
                    required
                    minlength="2"
                    #password="ngModel"
                    [disabled]="inProgressLoginButton"
                    placeholder="Enter your password"
                    [toggleMask]="true"
                    [feedback]="false"
                    styleClass="w-full">
        </p-password>
        <p-message *ngIf="password.errors?.['required'] && f.submitted"
                   severity="error"
                   text="Password is required">
        </p-message>
        <p-message *ngIf="password.errors?.['minlength'] && f.submitted"
                   severity="error"
                   text="Password must be at least 2 characters">
        </p-message>
      </div>

      <p-button type="submit"
                label="Sign In"
                icon="pi pi-sign-in"
                [loading]="inProgressLoginButton"
                styleClass="w-full login-btn">
      </p-button>

      <p-message *ngIf="f.submitted && isLoginFailed"
                 severity="error"
                 [text]="'Login failed: ' + errorMessage"
                 styleClass="w-full mt-3">
      </p-message>
    </form>

    <div class="success-message" *ngIf="isLoggedIn">
      <i class="pi pi-check-circle"></i>
      <h3>Welcome, {{username}}!</h3>
      <p>Redirecting...</p>
    </div>
  </p-card>
</div>
