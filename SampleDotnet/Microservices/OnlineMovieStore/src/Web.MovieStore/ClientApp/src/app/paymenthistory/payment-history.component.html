<div class="payment-history-container">
  <div class="page-header">
    <h2><i class="pi pi-history"></i> {{title}}</h2>
    <p-divider></p-divider>
  </div>

  <!-- Loading State -->
  <div class="loading-container" *ngIf="isLoading">
    <p-progressSpinner strokeWidth="4" animationDuration="1s"></p-progressSpinner>
    <p>Loading payment history...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && transactions.length === 0">
    <i class="pi pi-receipt"></i>
    <h3>No payment history yet</h3>
    <p>Your purchases will appear here</p>
    <p-button icon="pi pi-play"
              label="Browse Movies"
              [routerLink]="['/']">
    </p-button>
  </div>

  <!-- Transaction List -->
  <div class="transactions-list" *ngIf="!isLoading && transactions.length > 0">
    <p-card *ngFor="let transaction of transactions" styleClass="transaction-card">
      <ng-template pTemplate="header">
        <div class="transaction-header">
          <div class="order-info">
            <span class="order-label">Order ID:</span>
            <span class="order-id">{{transaction.id}}</span>
          </div>
          <p-tag [value]="transaction.totalcalculatedprice + '$'"
                 severity="success"
                 styleClass="total-tag">
          </p-tag>
        </div>
      </ng-template>

      <p-table [value]="transaction.transactionitems" styleClass="p-datatable-sm">
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 60px"></th>
            <th>Movie</th>
            <th style="width: 80px">Qty</th>
            <th style="width: 100px">Price</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr>
            <td>
              <img [src]="'assets/images/' + item.productid + '.png'"
                   [alt]="item.title"
                   class="transaction-item-image">
            </td>
            <td>
              <a class="item-title" (click)="movieById('/movie/' + item.productid)">
                {{item.title}}
              </a>
            </td>
            <td>
              <p-tag [value]="item.quantity + ' qty'" severity="info"></p-tag>
            </td>
            <td>
              <span class="item-price">{{item.calculatedprice}}</span>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>
